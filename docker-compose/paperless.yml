# =============================================================================
# Paperless-ngx - Document Management System
# =============================================================================
# Self-hosted document scanner, organizer, and archiver with OCR.
# Runs with its own PostgreSQL and Redis instances.
#
# Usage:
#   docker compose -f docker-compose/paperless.yml --env-file .env up -d
# =============================================================================

services:
  paperless-redis:
    image: redis:7
    container_name: paperless-redis
    restart: unless-stopped
    volumes:
      - ${DOCKER_BASE_PATH}/paperless/redis:/data

  paperless-db:
    image: postgres:16
    container_name: paperless-db
    restart: unless-stopped
    volumes:
      - ${DOCKER_BASE_PATH}/paperless/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: ${PAPERLESS_DB_PASSWORD}

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless
    restart: unless-stopped
    depends_on:
      - paperless-db
      - paperless-redis
    ports:
      - "8010:8000"
    volumes:
      - ${DOCKER_BASE_PATH}/paperless/data:/usr/src/paperless/data
      - ${DOCKER_BASE_PATH}/paperless/media:/usr/src/paperless/media
      - ${DOCKER_BASE_PATH}/paperless/export:/usr/src/paperless/export
      - ${DOCKER_BASE_PATH}/paperless/consume:/usr/src/paperless/consume
    environment:
      PAPERLESS_REDIS: redis://paperless-redis:6379
      PAPERLESS_DBHOST: paperless-db
      PAPERLESS_DBNAME: paperless
      PAPERLESS_DBUSER: paperless
      PAPERLESS_DBPASS: ${PAPERLESS_DB_PASSWORD}
      PAPERLESS_ADMIN_USER: ${PAPERLESS_ADMIN_USER}
      PAPERLESS_ADMIN_PASSWORD: ${PAPERLESS_ADMIN_PASSWORD}
      PAPERLESS_URL: http://${NAS_IP}:8010
      PAPERLESS_OCR_LANGUAGE: eng
      USERMAP_UID: ${PUID}
      USERMAP_GID: ${PGID}
      PAPERLESS_OCR_SKIP_ARCHIVE_FILE: with_text
      PAPERLESS_DEFAULT_PERMISSIONS_VIEW: all
      PAPERLESS_DEFAULT_PERMISSIONS_TAG: all
      PAPERLESS_APP_TITLE: ${PAPERLESS_TITLE:-Paperless-ngx}
