version: "3.8"

# =============================================================================
# Arr Stack - Media Automation
# =============================================================================
# Core media automation services for downloading, organizing, and managing
# movies, TV shows, anime, and music on a Ugreen NAS.
#
# Usage:
#   docker compose -f docker-compose/arr-stack.yml --env-file .env up -d
# =============================================================================

networks:
  arr-net:
    driver: bridge

  adguard-net:
    driver: macvlan
    driver_opts:
      parent: eth0
    ipam:
      config:
        - subnet: ${LAN_SUBNET}
          gateway: ${LAN_GATEWAY}
          ip_range: ${ADGUARD_IP}/32

services:
  # ---------------------------------------------------------------------------
  # Indexer Management
  # ---------------------------------------------------------------------------
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DOCKER_CONFIG_PATH}/prowlarr/config:/config
    ports:
      - "9696:9696"
    restart: unless-stopped
    networks: [arr-net]

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - TZ=${TZ}
    ports:
      - "8191:8191"
    restart: unless-stopped
    networks: [arr-net]

  # ---------------------------------------------------------------------------
  # Media Management
  # ---------------------------------------------------------------------------
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DOCKER_CONFIG_PATH}/sonarr/config:/config
      - ${MEDIA_PATH}:/media
      - ${DOWNLOADS_PATH}:/downloads
      - ${USENET_PATH}:/usenet
    ports:
      - "8989:8989"
    restart: unless-stopped
    networks: [arr-net]

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DOCKER_CONFIG_PATH}/radarr/config:/config
      - ${MEDIA_PATH}:/media
      - ${DOWNLOADS_PATH}:/downloads
      - ${USENET_PATH}:/usenet
    ports:
      - "7878:7878"
    restart: unless-stopped
    networks: [arr-net]

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DOCKER_CONFIG_PATH}/bazarr/config:/config
      - ${MEDIA_PATH}:/media
    ports:
      - "6767:6767"
    restart: unless-stopped
    networks: [arr-net]

  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:latest
    container_name: recyclarr
    environment:
      - TZ=${TZ}
      - SONARR_API_KEY=${SONARR_API_KEY}
      - RADARR_API_KEY=${RADARR_API_KEY}
      - CRON_SCHEDULE=@daily
    volumes:
      - ${DOCKER_CONFIG_PATH}/recyclarr/config:/config
    networks: [arr-net]
    user: "${PUID}:${PGID}"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Download Clients
  # ---------------------------------------------------------------------------
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DOCKER_CONFIG_PATH}/sabnzbd/config:/config
      - ${USENET_PATH}/complete:/downloads
      - ${USENET_PATH}/incomplete:/incomplete-downloads
    ports:
      - "8085:8080"
    restart: unless-stopped
    networks: [arr-net]

  # ---------------------------------------------------------------------------
  # Media Server & Requests
  # ---------------------------------------------------------------------------
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - JELLYFIN_PublishedServerUrl=http://${NAS_IP}:8899
    volumes:
      - ${DOCKER_CONFIG_PATH}/jellyfin/config:/config
      - ${MEDIA_PATH}:/media
    ports:
      - "8899:8096"
      - "8920:8920"       # HTTPS
      - "7359:7359/udp"   # Discovery
      - "1900:1900/udp"   # DLNA
    devices:
      - /dev/dri:/dev/dri  # Hardware transcoding (Intel QuickSync)
    restart: unless-stopped
    networks: [arr-net]

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DOCKER_CONFIG_PATH}/jellyseerr/config:/config
    ports:
      - "5055:5055"
    restart: unless-stopped
    networks: [arr-net]
    depends_on:
      - jellyfin

  requestrr:
    image: lscr.io/linuxserver/requestrr:latest
    container_name: requestrr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DOCKER_CONFIG_PATH}/requestrr/config:/config
    ports:
      - "4545:4545"
    restart: unless-stopped
    networks: [arr-net]

  # ---------------------------------------------------------------------------
  # Photos
  # ---------------------------------------------------------------------------
  immich-server:
    container_name: immich-server
    image: ghcr.io/immich-app/immich-server:release
    volumes:
      - ${PHOTOS_PATH}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=${TZ}
      - DB_HOSTNAME=immich-postgres
      - DB_USERNAME=${IMMICH_DB_USER}
      - DB_PASSWORD=${IMMICH_DB_PASSWORD}
      - DB_DATABASE_NAME=${IMMICH_DB_NAME}
      - REDIS_HOSTNAME=immich-redis
    ports:
      - "2283:2283"
    depends_on:
      - immich-redis
      - immich-postgres
    restart: always
    healthcheck:
      disable: false
    networks: [arr-net]

  immich-machine-learning:
    container_name: immich-machine-learning
    image: ghcr.io/immich-app/immich-machine-learning:release
    volumes:
      - ${DOCKER_CONFIG_PATH}/immich/model-cache:/cache
    environment:
      - TZ=${TZ}
    restart: always
    healthcheck:
      disable: false
    networks: [arr-net]

  immich-redis:
    container_name: immich-redis
    image: docker.io/valkey/valkey:8-bookworm
    healthcheck:
      test: valkey-cli ping || exit 1
    restart: always
    networks: [arr-net]

  immich-postgres:
    container_name: immich-postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    environment:
      POSTGRES_PASSWORD: ${IMMICH_DB_PASSWORD}
      POSTGRES_USER: ${IMMICH_DB_USER}
      POSTGRES_DB: ${IMMICH_DB_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${DOCKER_CONFIG_PATH}/immich/postgres:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    networks: [arr-net]

  # ---------------------------------------------------------------------------
  # Dashboard
  # ---------------------------------------------------------------------------
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DOCKER_CONFIG_PATH}/homepage/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks: [arr-net]

  # ---------------------------------------------------------------------------
  # Backups
  # ---------------------------------------------------------------------------
  duplicati:
    image: lscr.io/linuxserver/duplicati:latest
    container_name: duplicati
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - SETTINGS_ENCRYPTION_KEY=${DUPLICATI_ENCRYPTION_KEY}
      - DUPLICATI__WEBSERVICE_PASSWORD=${DUPLICATI_WEB_PASSWORD}
    volumes:
      - ${DOCKER_CONFIG_PATH}/duplicati/config:/config
      - ${DOCKER_CONFIG_PATH}:/source/arr-stack:ro
      - ${PHOTOS_PATH}:/source/photos:ro
      - ${BACKUPS_PATH}:/backups
    ports:
      - "8200:8200"
    restart: unless-stopped
    networks: [arr-net]

  # ---------------------------------------------------------------------------
  # DNS & Ad Blocking
  # ---------------------------------------------------------------------------
  adguardhome:
    image: adguard/adguardhome:latest
    container_name: adguardhome
    environment:
      - TZ=${TZ}
    volumes:
      - ${DOCKER_CONFIG_PATH}/adguardhome/work:/opt/adguardhome/work
      - ${DOCKER_CONFIG_PATH}/adguardhome/conf:/opt/adguardhome/conf
    networks:
      adguard-net:
        ipv4_address: ${ADGUARD_IP}
    restart: unless-stopped
